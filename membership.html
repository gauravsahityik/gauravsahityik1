<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>सदस्यता आवेदन</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">सदस्यता आवेदन</h2>

<form id="membershipForm">

<div class="mb-3">
<label>नाम</label>
<input type="text" class="form-control" name="name" required>
</div>

<div class="mb-3">
<label>मोबाइल</label>
<input type="text" class="form-control" name="mobile" required>
</div>

<div class="mb-3">
<label>ईमेल</label>
<input type="email" class="form-control" name="email" required>
</div>

<div class="mb-3">
<label>पता</label>
<textarea class="form-control" name="address"></textarea>
</div>

<button type="submit" class="btn btn-primary">
Submit
</button>

</form>

<div id="message" class="mt-3"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwoYdPsL2KMR22NiUA47v5s1hzwXAdnQLBY8Grfipc9q1f4Rpj2oFUQ7uoh6bT5UMNQ/exec";

const form = document.getElementById("membershipForm");

form.addEventListener("submit", e => {

e.preventDefault();

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})

.then(response=>response.text())

.then(data=>{

document.getElementById("message").innerHTML =
"<div class='alert alert-success'>Application Submitted Successfully.</div>";

form.reset();

})

.catch(error=>{

document.getElementById("message").innerHTML =
"<div class='alert alert-danger'>Submission Failed.</div>";

});

});

</script>

</body>
</html>
