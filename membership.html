<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>सदस्यता फॉर्म | गौरव साहित्यिक एवं सांस्कृतिक संस्थान</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css//style2.css">
</head>

<body>

<section class="bg-danger text-white text-center py-5">
<div class="container">
<h1>👥 सदस्यता आवेदन</h1>
<p>गौरव साहित्यिक एवं सांस्कृतिक संस्थान</p>
</div>
</section>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow p-4">

<form action="https://formsubmit.co/niralasanjay53@gmail.com" method="POST">

<div class="mb-3">
<label class="form-label">पूरा नाम</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">मोबाइल नंबर</label>
<input type="tel" name="mobile" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">ईमेल</label>
<input type="email" name="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">पूरा पता</label>
<textarea name="address" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">व्यवसाय</label>
<input type="text" name="profession" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">अपना परिचय</label>
<textarea name="message" class="form-control" rows="5"></textarea>
</div>

<button type="submit" class="btn btn-danger w-100">
सदस्यता के लिए आवेदन करें
</button>

</form>

</div>

</div>

</div>

</div>

<footer class="bg-dark text-white text-center py-4">
© 2023 गौरव साहित्यिक एवं सांस्कृतिक संस्थान
</footer>

</body>
</html>
